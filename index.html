<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<title>Sleep Predictor</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}
button {
  padding: 10px;
}
</style>
</head>

<body>

<h2>🍼 Sleep Predictor</h2>

<input type="number" id="age" placeholder="Âge (mois)">
<br><br>

<input type="time" id="wake">
<br><br>

<input type="number" id="nap" placeholder="Dernière sieste (min)">
<br><br>

<button onclick="predict()">Prédire</button>

<h3 id="result"></h3>

<script>
navigator.serviceWorker.register("service-worker.js");

function baseWindow(age) {
  if (age <= 6) return 120;
  if (age <= 12) return 180;
  return 240;
}

function predict() {
  let age = +document.getElementById("age").value;
  let nap = +document.getElementById("nap").value;
  let wakeTime = document.getElementById("wake").value;

  if (!wakeTime) return alert("Heure requise");

  let base = baseWindow(age);

  let [h, m] = wakeTime.split(":").map(Number);
  let total = h*60 + m + base;

  let nh = Math.floor(total/60)%24;
  let nm = total%60;

  document.getElementById("result").innerHTML =
    "😴 Sieste: " + nh.toString().padStart(2,'0') + ":" + nm.toString().padStart(2,'0');
}
</script>

</body>
</html>
