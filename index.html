<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sleep App Pro</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="avatar"></div>
    <div class="learning">🧠 Learning 72%</div>
  </div>

  <!-- CERCLE -->
  <div class="circle" id="circle">
    <div class="center">
      <div id="countdown" class="big">-- min</div>
      <div class="sub">Next nap</div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button onclick="startSleep()">😴 Start</button>
    <button onclick="endSleep()">⏰ Wake</button>
    <button onclick="pauseSleep()">⛔ Pause</button>
    <div id="sleepList" style="margin-top:20px;"></div>
  </div>

  <!-- AJOUT MANUEL -->
  <div class="manual">
    <input type="time" id="start">
    <input type="time" id="end">
    <button onclick="addManual()">Add</button>
  </div>

</div>

<script src="data.js"></script>
<script src="logic.js"></script>
<script src="app.js"></script>

</body>
</html>
