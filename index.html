<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sleep App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f1226;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      background: #1c1f3a;
      padding: 15px;
      border-radius: 15px;
      margin: 15px 0;
    }

    input, select, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #7c8cff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .item {
      background: #2a2f5a;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    #nextTime {
      font-size: 16px;
      line-height: 1.6;
    }

    #countdown {
      font-size: 18px;
      margin-top: 10px;
      color: #ffb86c;
    }
  </style>
</head>

<body>

  <h1>😴 Sleep App</h1>

  <!-- 👶 PROFIL -->
  <div class="card">
    <h3>👶 Bébé</h3>
    <input type="date" id="birthDate">
    <button onclick="saveBirth()">Enregistrer âge</button>
  </div>

  <!-- ▶️ ACTIONS -->
  <div class="card">
    <h3>Actions</h3>
    <button onclick="startSleep('nap')">😴 Début sieste</button>
    <button onclick="startSleep('night')">🌙 Début nuit</button>
    <button onclick="endSleep()">⏹ Fin</button>

    <div id="countdown"></div>
  </div>

  <!-- ➕ AJOUT MANUEL -->
  <div class="card">
    <h3>➕ Ajouter manuellement</h3>

    <input type="date" id="date"><br>
    <input type="time" id="start">
    <input type="time" id="end"><br>

    <select id="sleepType">
      <option value="nap">😴 Sieste</option>
      <option value="night">🌙 Nuit</option>
    </select><br>

    <button onclick="addManual()">Ajouter</button>
  </div>

  <!-- CERCLE -->
<div class="card">
  <h3>🕒 Journée</h3>
  <div id="circle" style="position:relative;width:300px;height:300px;margin:auto;"></div>
</div>
  
  <!-- 🔮 PREDICTIONS -->
  <div class="card">
    <h3>🔮 Prévisions</h3>
    <div id="nextTime">Aucune donnée</div>
  </div>

  <!-- 📋 LISTE -->
  <div class="card">
    <h3>📋 Historique</h3>
    <div id="sleepList"></div>
  </div>

  <script src="app.js"></script>

</body>
</html>
